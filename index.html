<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXCLSV_SELECT - 試算表自動記錄版</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); }
        .slide-in-right { animation: slideInRight 0.3s ease-out forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .fade-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; scale: 0.95; } to { opacity: 1; scale: 1; } }
    </style>
</head>
<body class="bg-[#f9f9f9]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ==========================================
        // 🌟 核心設定區 🌟
        // ==========================================
        const WHATSAPP_NUMBER = "85251264018";
        const ADMIN_EMAIL = "tschho@gmail.com";
        
        // 已更新為正確的 /exec 網址！
        const GOOGLE_SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbwFjqR5gcH2aBn6AFzOKrCffo3hGcQg19N5ALW0oCKeUJLQTPltj7HWPIOdv_ZhvxMV/exec"; 

        const CURRENCY_RATE = 1; 
        const PRICE_MARKUP = 1;
        const ITEMS_PER_PAGE = 100;

        const calculatePrice = (price) => {
            if (!price || price <= 0) return 0;
            return Math.round(price * CURRENCY_RATE) + PRICE_MARKUP;
        };

        const formatSize = (size) => {
            if (!size) return '';
            return /^\d/.test(size) ? `US ${size}` : size;
        };

        // --- SVG 圖示庫 ---
        const Icons = {
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
            ShoppingBag: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#10b981" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        };

        function App() {
            const [products, setProducts] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedBrand, setSelectedBrand] = useState('All');
            const [sortOption, setSortOption] = useState('default');
            const [currentPage, setCurrentPage] = useState(1);
            const [cart, setCart] = useState([]);
            const [user, setUser] = useState(null); 
            const [paymentMethod, setPaymentMethod] = useState('fps');
            const [activeModal, setActiveModal] = useState(null); 
            const [selectedProduct, setSelectedProduct] = useState(null); 
            const [selectedSize, setSelectedSize] = useState(''); 
            const [orderLinks, setOrderLinks] = useState({ waUrl: '', mailUrl: '' }); 

            // 表單資訊
            const [formData, setFormData] = useState({
                firstName: '', lastName: '', phone: '', address: ''
            });

            // 讀取商品資料
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch('./products.json');
                        const data = await response.json();
                        setProducts(data.filter(p => p.my_price > 0 || p.original_price > 0));
                    } catch (err) { console.error(err); } finally { setIsLoading(false); }
                };
                fetchData();
            }, []);

            const brands = useMemo(() => {
                const counts = {};
                products.forEach(p => { if (p.brand) counts[p.brand] = (counts[p.brand] || 0) + 1; });
                const sortedBrands = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
                return [{ name: 'All', count: products.length }, ...sortedBrands.map(b => ({ name: b, count: counts[b] }))];
            }, [products]);

            const filteredProducts = useMemo(() => {
                let result = [...products];
                if (selectedBrand !== 'All') result = result.filter(p => p.brand === selectedBrand);
                if (searchQuery.trim()) {
                    const q = searchQuery.toLowerCase();
                    result = result.filter(p => (p.name?.toLowerCase().includes(q)) || (p.brand?.toLowerCase().includes(q)));
                }
                result.forEach(p => {
                    p.calcMyPrice = calculatePrice(p.my_price);
                    p.calcOrigPrice = calculatePrice(p.original_price);
                });
                if (sortOption === 'price-asc') result.sort((a, b) => a.calcMyPrice - b.calcMyPrice);
                else if (sortOption === 'price-desc') result.sort((a, b) => b.calcMyPrice - a.calcMyPrice);
                return result;
            }, [products, selectedBrand, searchQuery, sortOption]);

            const currentItems = filteredProducts.slice((currentPage - 1) * ITEMS_PER_PAGE, currentPage * ITEMS_PER_PAGE);
            const cartTotal = cart.reduce((sum, item) => sum + item.price, 0);

            const handlePayment = (e) => {
                e.preventDefault();

                // 生成訂單訊息內容
                const orderId = Math.random().toString(36).substr(2, 6).toUpperCase();
                let orderItemsText = cart.map(item => `- ${item.brand} ${item.name} (Size: ${formatSize(item.selectedSize)}) x 1`).join('\n');
                
                const message = `🛍️ 【新訂單通知】編號: #${orderId}\n\n` +
                              `👤 客人姓名: ${formData.lastName}${formData.firstName}\n` +
                              `📞 聯絡電話: ${formData.phone}\n` +
                              `📍 收貨地址: ${formData.address}\n\n` +
                              `🛒 訂單內容:\n${orderItemsText}\n\n` +
                              `💰 總計金額: HK$ ${cartTotal.toLocaleString()}\n` +
                              `💳 付款方式: ${paymentMethod.toUpperCase()}\n\n` +
                              `請核對款項並安排發貨。`;

                // ==========================================
                // 🌟 發送數據到 Google 試算表 🌟
                // ==========================================
                if (GOOGLE_SHEETS_API_URL && GOOGLE_SHEETS_API_URL !== "請在此貼上你的_Google_Apps_Script_URL") {
                    const sheetData = {
                        orderId: orderId,
                        customerName: `${formData.lastName}${formData.firstName}`,
                        phone: formData.phone,
                        address: formData.address,
                        itemsText: orderItemsText,
                        total: cartTotal,
                        paymentMethod: paymentMethod.toUpperCase()
                    };

                    // 使用 fetch 發送 (加上 mode: 'no-cors' 以防跨網域阻擋問題)
                    fetch(GOOGLE_SHEETS_API_URL, {
                        method: 'POST',
                        mode: 'no-cors', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(sheetData)
                    }).then(() => {
                        console.log('請求已發送至 Google 試算表');
                    }).catch(error => console.error('Google Sheets 記錄發生錯誤:', error));
                }

                // 準備 WhatsApp 和 Email 連結
                const waUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
                const mailUrl = `mailto:${ADMIN_EMAIL}?subject=${encodeURIComponent(`[訂單 #${orderId}] ${formData.lastName} 的新訂單`)}&body=${encodeURIComponent(message)}`;

                setOrderLinks({ waUrl, mailUrl });
                setActiveModal('success');
                setCart([]); 

                // 在手機上自動跳轉 WhatsApp
                setTimeout(() => {
                    window.location.href = waUrl;
                }, 300);
            };

            if (isLoading) return <div className="min-h-screen flex items-center justify-center bg-[#f9f9f9] font-bold">讀取庫存中...</div>;

            return (
                <div className="min-h-screen bg-[#f9f9f9] text-[#1a1a1a] font-sans relative">
                    <nav className="bg-white/90 backdrop-blur-md border-b sticky top-0 z-40 px-4 py-3 shadow-sm">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <h1 className="text-2xl font-black italic tracking-tighter cursor-pointer" onClick={() => { setActiveModal(null); setSelectedBrand('All'); }}>EXCLSV_SELECT</h1>
                            <div className="flex items-center gap-6">
                                <button onClick={() => !user ? setActiveModal('auth') : null} className="hover:opacity-70 flex items-center gap-1">
                                    <Icons.User /> {user && <span className="text-xs font-bold">{user.name}</span>}
                                </button>
                                <button onClick={() => setActiveModal('cart')} className="relative cursor-pointer hover:opacity-70">
                                    <Icons.ShoppingBag />
                                    {cart.length > 0 && <span className="absolute -top-1.5 -right-2 bg-red-600 text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center">{cart.length}</span>}
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto py-8 px-4">
                        <div className="flex flex-col md:flex-row justify-between gap-4 mb-8 bg-white p-4 rounded-xl shadow-sm border border-neutral-100">
                            <div className="relative w-full md:w-96">
                                <input type="text" placeholder="搜尋品牌或單品..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-10 pr-4 py-2.5 text-sm font-bold border rounded-lg bg-[#f9f9f9]" />
                                <div className="absolute left-3.5 top-3 text-neutral-400"><Icons.Search /></div>
                            </div>
                            <select value={sortOption} onChange={(e) => setSortOption(e.target.value)} className="text-sm font-bold border rounded-lg px-4 py-2.5 bg-[#f9f9f9]">
                                <option value="default">排序: 推薦</option>
                                <option value="price-asc">價格: 低到高</option>
                                <option value="price-desc">價格: 高到低</option>
                            </select>
                        </div>

                        <div className="flex gap-2 overflow-x-auto pb-6 hide-scrollbar">
                            {brands.map((brand) => (
                                <button key={brand.name} onClick={() => setSelectedBrand(brand.name)} className={`px-5 py-2.5 text-[10px] font-black uppercase tracking-widest rounded-full border-2 whitespace-nowrap transition-all ${selectedBrand === brand.name ? 'bg-black text-white border-black scale-105 shadow-md' : 'bg-white text-neutral-400 border-neutral-100 hover:border-black'}`}>
                                    {brand.name} {brand.name !== 'All' && `(${brand.count})`}
                                </button>
                            ))}
                        </div>
                        
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-x-4 gap-y-10">
                            {currentItems.map((p, idx) => (
                                <div key={idx} className="group flex flex-col h-full bg-white rounded-xl p-3 border border-transparent hover:border-neutral-200 transition-all hover:shadow-xl cursor-pointer" onClick={() => { setSelectedProduct(p); setSelectedSize(''); setActiveModal('detail'); }}>
                                    <div className="aspect-[3/4] overflow-hidden bg-[#f4f4f4] rounded-lg mb-4 relative">
                                        <img src={p.image} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                        {p.calcOrigPrice > p.calcMyPrice && <div className="bg-red-600 absolute top-2 left-2 text-white text-[9px] font-black px-2 py-1 rounded shadow-md">SALE</div>}
                                    </div>
                                    <div className="flex-grow space-y-1.5 px-1">
                                        <div className="text-[10px] font-black text-neutral-400 uppercase">{p.brand}</div>
                                        <h3 className="font-bold text-[13px] leading-tight h-10 overflow-hidden line-clamp-2">{p.name}</h3>
                                        <div className="pt-2 flex flex-col">
                                            <span className="text-xl font-black italic">HK$ {p.calcMyPrice.toLocaleString()}</span>
                                            {p.calcOrigPrice > p.calcMyPrice && <span className="text-[10px] text-neutral-400 line-through">HK$ {p.calcOrigPrice.toLocaleString()}</span>}
                                        </div>
                                    </div>
                                    <button className="w-full mt-4 py-2.5 bg-neutral-100 text-[10px] font-black uppercase rounded-lg group-hover:bg-black group-hover:text-white transition-all">查看詳情</button>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* 商品詳情 Modal */}
                    {activeModal === 'detail' && selectedProduct && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
                            <div className="bg-white rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto flex flex-col md:flex-row shadow-2xl fade-in relative">
                                <button onClick={() => setActiveModal(null)} className="absolute top-4 right-4 z-10 p-2 bg-white rounded-full shadow-md hover:bg-neutral-100"><Icons.X /></button>
                                <div className="w-full md:w-1/2 bg-[#f4f4f4]"><img src={selectedProduct.image} className="w-full h-full object-cover" /></div>
                                <div className="w-full md:w-1/2 p-8 flex flex-col">
                                    <div className="text-xs font-black text-neutral-400 uppercase tracking-widest mb-2">{selectedProduct.brand}</div>
                                    <h2 className="text-2xl font-bold mb-4">{selectedProduct.name}</h2>
                                    <div className="flex items-end gap-3 mb-6">
                                        <span className="text-3xl font-black italic text-red-600">HK$ {selectedProduct.calcMyPrice.toLocaleString()}</span>
                                    </div>
                                    <div className="mb-6">
                                        <span className="text-sm font-bold uppercase block mb-3">選擇尺碼 (US)</span>
                                        <div className="grid grid-cols-4 gap-2">
                                            {selectedProduct.sizes?.map((s, idx) => (
                                                <button key={idx} onClick={() => setSelectedSize(s)} className={`py-3 text-sm font-bold border rounded-lg ${selectedSize === s ? 'bg-black text-white' : 'border-neutral-200'}`}>{formatSize(s)}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => { if(!selectedSize) return alert('請選擇尺碼'); setCart([...cart, {...selectedProduct, cartId: Math.random(), selectedSize, price: selectedProduct.calcMyPrice}]); setActiveModal('cart'); }} className="w-full py-4 bg-black text-white font-black uppercase rounded-xl shadow-lg">加入購物車</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 購物車 Modal */}
                    {activeModal === 'cart' && (
                        <div className="fixed inset-0 z-50 flex justify-end modal-overlay">
                            <div className="w-full max-w-md bg-white h-full shadow-2xl flex flex-col slide-in-right relative">
                                <div className="p-6 border-b flex justify-between items-center"><h2 className="text-xl font-black italic">CART ({cart.length})</h2><button onClick={() => setActiveModal(null)}><Icons.X /></button></div>
                                <div className="flex-1 overflow-y-auto p-6 space-y-6">
                                    {cart.map(item => (
                                        <div key={item.cartId} className="flex gap-4 items-center">
                                            <img src={item.image} className="w-16 h-20 object-cover rounded-lg" />
                                            <div className="flex-1">
                                                <div className="text-[10px] font-black text-neutral-400 uppercase">{item.brand}</div>
                                                <div className="text-sm font-bold">{item.name}</div>
                                                <div className="text-xs font-bold">Size: {formatSize(item.selectedSize)}</div>
                                                <div className="font-black">HK$ {item.price.toLocaleString()}</div>
                                            </div>
                                            <button onClick={() => setCart(cart.filter(i => i.cartId !== item.cartId))}><Icons.Trash /></button>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-6 border-t bg-neutral-50">
                                    <div className="flex justify-between font-black text-xl mb-6"><span>總計</span><span>HK$ {cartTotal.toLocaleString()}</span></div>
                                    <button onClick={() => !user ? setActiveModal('auth') : setActiveModal('checkout')} className="w-full py-4 bg-black text-white font-black uppercase rounded-xl">前往結帳</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 登入 Modal */}
                    {activeModal === 'auth' && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 modal-overlay">
                            <div className="bg-white rounded-2xl w-full max-w-md p-8 shadow-2xl fade-in relative">
                                <button onClick={() => setActiveModal('cart')} className="absolute top-4 right-4"><Icons.X /></button>
                                <h2 className="text-2xl font-black uppercase italic mb-6 text-center">結帳方式</h2>
                                <button onClick={() => { setUser({name: '遊客'}); setActiveModal('checkout'); }} className="w-full py-3.5 border-2 border-black font-black rounded-lg">以遊客身分繼續結帳</button>
                            </div>
                        </div>
                    )}

                    {/* 結帳與付款 Modal */}
                    {activeModal === 'checkout' && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 modal-overlay">
                            <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-8 shadow-2xl fade-in relative text-sm">
                                <button onClick={() => setActiveModal('cart')} className="absolute top-4 right-4"><Icons.X /></button>
                                <h2 className="text-2xl font-black italic mb-6">SECURE CHECKOUT</h2>
                                <form onSubmit={handlePayment} className="space-y-6">
                                    <div>
                                        <h3 className="font-bold text-lg mb-3">1. 運送資訊</h3>
                                        <div className="grid grid-cols-2 gap-4">
                                            <input type="text" required placeholder="姓氏" onChange={e => setFormData({...formData, lastName: e.target.value})} className="border rounded-lg px-4 py-3 outline-none" />
                                            <input type="text" required placeholder="名字" onChange={e => setFormData({...formData, firstName: e.target.value})} className="border rounded-lg px-4 py-3 outline-none" />
                                            <input type="text" required placeholder="聯絡電話" onChange={e => setFormData({...formData, phone: e.target.value})} className="col-span-2 border rounded-lg px-4 py-3 outline-none" />
                                            <textarea required placeholder="詳細地址 (住宅 / 順豐站 / 智能櫃)" onChange={e => setFormData({...formData, address: e.target.value})} className="col-span-2 border rounded-lg px-4 py-3 outline-none h-20"></textarea>
                                        </div>
                                    </div>
                                    <div>
                                        <h3 className="font-bold text-lg mb-3">2. 選擇付款方式</h3>
                                        <div className="grid grid-cols-2 gap-2 mb-4">
                                            {['fps', 'payme', 'alipay', 'wechat'].map(m => (
                                                <button type="button" key={m} onClick={() => setPaymentMethod(m)} className={`py-3 border-2 font-bold rounded-xl ${paymentMethod === m ? 'border-black bg-neutral-50' : 'border-neutral-200'}`}>{m.toUpperCase()}</button>
                                            ))}
                                        </div>
                                        <div className="bg-neutral-50 border p-6 rounded-xl text-center">
                                            {paymentMethod === 'fps' && <p className="text-2xl font-black text-emerald-600">FPS ID: 1234567</p>}
                                            {paymentMethod === 'payme' && <p className="text-2xl font-black text-red-500">PayMe: +852 51264018</p>}
                                            <p className="text-[10px] text-neutral-400 mt-2 font-bold">⚠️ 完成轉帳後，點擊下方按鈕將生成您的訂單。</p>
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full py-4 bg-black text-white font-black text-lg rounded-xl shadow-lg">我已付款，提交訂單通知</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 成功頁面與手動發送選項 */}
                    {activeModal === 'success' && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 modal-overlay">
                            <div className="bg-white rounded-2xl w-full max-w-sm p-8 shadow-2xl text-center fade-in">
                                <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-6 mx-auto"><Icons.Check /></div>
                                <h2 className="text-2xl font-black mb-2">訂單已生成！</h2>
                                <p className="text-neutral-500 text-sm mb-6">系統正在為您跳轉至 WhatsApp 發送詳情...</p>
                                
                                {/* 保底按鈕區塊 */}
                                <div className="space-y-3 mb-8">
                                    <a href={orderLinks.waUrl} target="_blank" rel="noopener noreferrer" className="block w-full py-3.5 bg-[#25D366] text-white font-black rounded-xl shadow-md hover:opacity-90 transition-opacity">
                                        🟢 確認發送 WhatsApp
                                    </a>
                                    <a href={orderLinks.mailUrl} className="block w-full py-3.5 bg-neutral-800 text-white font-black rounded-xl shadow-md hover:opacity-90 transition-opacity">
                                        ✉️ 透過 Email 發送備份
                                    </a>
                                </div>

                                <button onClick={() => setActiveModal(null)} className="text-sm font-bold text-neutral-400 hover:text-black underline">返回首頁繼續選購</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
