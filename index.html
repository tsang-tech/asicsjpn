<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Select - Premium Outlet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <nav class="bg-white border-b sticky top-0 z-50 p-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic tracking-tighter">EXCLSV_SELECT</h1>
            <div class="text-sm font-bold text-orange-600">EUROPE SALE DIRECT</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-10 px-4">
        <div id="loading" class="text-center py-20 text-gray-500">載入最新特價商品中...</div>
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </main>

    <script>
        fetch('./products.json')
            .then(response => response.json())
            .then(data => {
                const loading = document.getElementById('loading');
                const grid = document.getElementById('product-grid');
                loading.classList.add('hidden');
                
                grid.innerHTML = data.map(product => `
                    <div class="product-card bg-white border border-gray-100 rounded-lg overflow-hidden transition-all shadow-sm hover:shadow-md">
                        <div class="aspect-square bg-gray-100 overflow-hidden">
                            <img src="${product.image || 'https://via.placeholder.com/400'}" 
                                 class="w-full h-full object-cover transition-transform duration-500"
                                 onerror="this.src='https://via.placeholder.com/400?text=No+Image'">
                        </div>
                        <div class="p-4">
                            <h3 class="font-medium text-sm h-10 overflow-hidden line-clamp-2">${product.name}</h3>
                            <div class="mt-4 flex flex-col">
                                <span class="text-lg font-black text-black tracking-tight font-mono">HK$ ${product.my_price}</span>
                                <span class="text-xs text-gray-400 line-through">HK$ ${product.original_price}</span>
                            </div>
                            <button class="w-full mt-4 bg-black text-white text-xs font-bold py-3 uppercase tracking-widest hover:bg-gray-800">
                                立即購買
                            </button>
                        </div>
                    </div>
                `).join('');
            })
            .catch(err => {
                document.getElementById('loading').innerText = "暫時無法載入商品，請稍後再試。";
            });
    </script>
</body>
</html>
