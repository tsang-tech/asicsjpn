<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXCLSV_SELECT - 歐洲精品代購</title>
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 以編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #FAFAFA; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        .slide-down { animation: slideDown 0.3s ease-out forwards; overflow: hidden; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 400px; } }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 30s linear infinite; }
        /* 自訂 Radio 按鈕樣式 */
        .payment-radio:checked + div { border-color: black; background-color: #fafafa; }
        .payment-radio:checked + div .radio-dot { background-color: black; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const ITEMS_PER_PAGE = 50; // 每頁顯示 50 件

        // --- SVG 圖示組件 ---
        const IconShoppingBag = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>);
        const IconSearch = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>);
        const IconChevronRight = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>);
        const IconX = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>);
        const IconTrash2 = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>);
        const IconArrowLeft = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>);
        const IconCheck = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>);
        const IconRuler = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.3 15.3l-2.6-2.6a1 1 0 0 0-1.4 0l-12 12a1 1 0 0 0 0 1.4l2.6 2.6a1 1 0 0 0 1.4 0l12-12a1 1 0 0 0 0-1.4z"/><path d="M14.5 5.5l4 4"/><path d="M10.5 9.5l4 4"/><path d="M6.5 13.5l4 4"/></svg>);

        const MOCK_DATA = [
            { "brand": "JORDAN", "name": "Retro High OG 'Royal Reimagined'", "original_price": 1599, "my_price": 1159, "image": "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=400&h=533&fit=crop", "sizes": ["8", "8.5", "9", "9.5", "10", "10.5", "11"], "status": "AVAILABLE" },
            { "brand": "STUSSY", "name": "Basic Stussy Logo Tee", "original_price": 450, "my_price": 320, "image": "https://images.unsplash.com/photo-1576566588028-4147f3842f27?w=400&h=533&fit=crop", "sizes": ["S", "M", "L", "XL"], "status": "AVAILABLE" },
            { "brand": "NIKE", "name": "Air Force 1 '07 Premium", "original_price": 899, "my_price": 699, "image": "https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=400&h=533&fit=crop", "sizes": ["7", "7.5", "8", "8.5", "9"], "status": "AVAILABLE" }
        ];

        // 強制所有尺碼加上 "US Size" 字樣
        const formatSize = (size) => {
            if (!size) return '';
            const trimmedSize = String(size).trim();
            if (trimmedSize.toUpperCase().includes('US')) return trimmedSize;
            return `US Size ${trimmedSize}`;
        };

        const App = () => {
            const [products, setProducts] = useState([]);
            const [isLoading, setIsLoading] = useState(true);

            const [searchQuery, setSearchQuery] = useState('');
            const [selectedBrand, setSelectedBrand] = useState('All');
            const [sortOption, setSortOption] = useState('default');
            const [currentPage, setCurrentPage] = useState(1);

            const [cart, setCart] = useState([]);
            const [activeModal, setActiveModal] = useState(null); 
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [selectedSize, setSelectedSize] = useState(null); 
            const [showSizeChart, setShowSizeChart] = useState(false); // 控制尺碼表的顯示

            const [orderData, setOrderData] = useState({
                name: '',
                phone: '',
                address: '',
                paymentMethod: '轉數快 (FPS)'
            });
            const [checkoutErrors, setCheckoutErrors] = useState({});
            const [orderLinks, setOrderLinks] = useState({ whatsappUrl: '', orderDetails: '' });
            const [isSubmitting, setIsSubmitting] = useState(false);

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch('./products.json');
                        if (!response.ok) throw new Error('File not found');
                        const data = await response.json();
                        const validData = data
                            .filter(p => p.my_price > 0 || p.original_price > 0)
                            .map(p => ({ ...p, id: Math.random().toString(36).substr(2, 9) }));
                        setProducts(validData.length > 0 ? validData : MOCK_DATA.map(p => ({...p, id: Math.random().toString(36).substr(2,9)})));
                    } catch (err) {
                        setProducts(MOCK_DATA.map(p => ({...p, id: Math.random().toString(36).substr(2,9)})));
                    } finally {
                        setIsLoading(false);
                    }
                };
                fetchData();
            }, []);

            const brands = useMemo(() => {
                const counts = {};
                products.forEach(p => {
                    const b = p.brand || 'Other';
                    counts[b] = (counts[b] || 0) + 1;
                });
                // 將品牌依照 A-Z 順序排列 (localeCompare 實現字母排序)
                const sortedBrands = Object.keys(counts).sort((a, b) => a.localeCompare(b));
                return [{ name: 'All', count: products.length }, ...sortedBrands.map(b => ({ name: b, count: counts[b] }))];
            }, [products]);

            const filteredProducts = useMemo(() => {
                let result = [...products];
                if (selectedBrand !== 'All') result = result.filter(p => (p.brand || 'Other') === selectedBrand);
                if (searchQuery.trim()) {
                    const q = searchQuery.toLowerCase();
                    result = result.filter(p => (p.name && p.name.toLowerCase().includes(q)) || (p.brand && p.brand.toLowerCase().includes(q)));
                }
                if (sortOption === 'price-asc') result.sort((a, b) => a.my_price - b.my_price);
                else if (sortOption === 'price-desc') result.sort((a, b) => b.my_price - a.my_price);
                return result;
            }, [products, selectedBrand, searchQuery, sortOption]);

            // 當篩選條件改變時，自動回到第一頁
            useEffect(() => {
                setCurrentPage(1);
            }, [selectedBrand, searchQuery, sortOption]);

            const totalPages = Math.ceil(filteredProducts.length / ITEMS_PER_PAGE) || 1;
            const currentItems = filteredProducts.slice((currentPage - 1) * ITEMS_PER_PAGE, currentPage * ITEMS_PER_PAGE);

            const handlePageChange = (newPage) => {
                setCurrentPage(newPage);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const addToCart = (product, sizeStr = 'One Size') => {
                setCart(prev => {
                    const existingIndex = prev.findIndex(item => item.id === product.id && item.selectedSize === sizeStr);
                    if (existingIndex >= 0) {
                        const newCart = [...prev];
                        newCart[existingIndex].quantity += 1;
                        return newCart;
                    }
                    return [...prev, { ...product, selectedSize: sizeStr, cartItemId: Math.random().toString(36).substr(2, 9), quantity: 1 }];
                });
                setActiveModal('cart');
            };

            const removeFromCart = (cartItemId) => setCart(prev => prev.filter(item => item.cartItemId !== cartItemId));
            const cartTotal = cart.reduce((sum, item) => sum + (item.my_price * item.quantity), 0);

            const openProductDetail = (product) => {
                setSelectedProduct(product);
                setSelectedSize(null);
                setShowSizeChart(false); // 重置尺碼表狀態
                setActiveModal('productDetail');
            };

            const validateAndProceed = () => {
                const errors = {};
                if (!orderData.name.trim()) errors.name = '請輸入姓名';
                if (!orderData.phone.trim()) errors.phone = '請輸入聯絡電話';
                if (!orderData.address.trim()) errors.address = '請輸入收貨地址 / 順豐站 / 順豐智能櫃號碼';

                if (Object.keys(errors).length > 0) {
                    setCheckoutErrors(errors);
                    return;
                }
                setCheckoutErrors({});
                setActiveModal('checkoutPayment');
            };

            const generateFinalOrder = async () => {
                setIsSubmitting(true);

                const phoneNumber = "85251264018";
                
                let itemsTextForSheet = "";
                let orderText = "🛒 *新訂單通知*\n";
                orderText += `👤 收件人姓名: ${orderData.name}\n`;
                orderText += `📞 聯絡電話: ${orderData.phone}\n`;
                orderText += `📍 收貨地址/順豐: ${orderData.address}\n`;
                orderText += `💳 支付方式: ${orderData.paymentMethod}\n`;
                orderText += "------------------\n";
                
                cart.forEach((item, index) => {
                    const itemLine = `${index + 1}. ${item.brand || '無品牌'} - ${item.name}\n   尺碼: ${item.selectedSize}\n   數量: ${item.quantity}\n   價格: HK$ ${item.my_price * item.quantity}\n\n`;
                    orderText += itemLine;
                    itemsTextForSheet += itemLine;
                });
                orderText += `------------------\n💰 *總金額: HK$ ${cartTotal}*`;

                const orderId = "ORD-" + Date.now().toString().slice(-6);

                const formDataObj = new URLSearchParams();
                formDataObj.append('orderId', orderId);
                formDataObj.append('customerName', orderData.name);
                formDataObj.append('phone', orderData.phone);
                formDataObj.append('address', orderData.address);
                formDataObj.append('itemsText', itemsTextForSheet); 
                formDataObj.append('total', cartTotal);
                formDataObj.append('paymentMethod', orderData.paymentMethod);

                const webhookUrl = "https://script.google.com/macros/s/AKfycbzNh86G8XK1UmlTBCflB0oFhVuXbiFzdi7SRAPtF31WBPAmZ6u89QDZrdVmX4YFwWzj3Q/exec";

                const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(orderText)}`;
                setOrderLinks({ whatsappUrl, orderDetails: orderText });

                try {
                    await fetch(webhookUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded'
                        },
                        body: formDataObj.toString()
                    });
                } catch (error) {
                    console.error("Fetch Error:", error);
                }

                setIsSubmitting(false);
                setActiveModal('orderComplete');
            };

            const renderPaymentDetails = (method) => {
                if (orderData.paymentMethod !== method) return null;
                
                const paymentInfo = {
                    '轉數快 (FPS)': { 
                        color: 'border-purple-200 bg-purple-50', 
                        textCol: 'text-purple-700', 
                        imgPath: null, 
                        info: (
                            <div className="mt-2 text-left bg-white p-3 rounded-lg border border-purple-100">
                                <p className="text-neutral-600 mb-1">FPS ID (識別碼): <strong className="text-black text-base select-all tracking-wider">127569788</strong></p>
                                <p className="text-neutral-600">電話號碼: <strong className="text-black text-base select-all tracking-wider">85251264018</strong></p>
                                <p className="text-xs text-purple-600 mt-2">* 點擊數字可直接選取複製</p>
                            </div>
                        )
                    },
                    'PayMe': { 
                        color: 'border-[#E51937]/20 bg-[#E51937]/5', 
                        textCol: 'text-[#E51937]', 
                        imgPath: './payme.jpeg',
                        info: <p className="mt-2 text-[#E51937] font-bold">請掃描上方 PayMe QR Code 進行付款</p> 
                    },
                    '支付寶 (AlipayHK)': { 
                        color: 'border-[#00A0E9]/20 bg-[#00A0E9]/5', 
                        textCol: 'text-[#00A0E9]', 
                        imgPath: './alipay.jpeg',
                        info: <p className="mt-2 text-[#00A0E9] font-bold">請打開支付寶 HK 掃描付款</p> 
                    },
                    'WeChat Pay': { 
                        color: 'border-[#1AAD19]/20 bg-[#1AAD19]/5', 
                        textCol: 'text-[#1AAD19]', 
                        imgPath: './wechat.jpeg',
                        info: <p className="mt-2 text-[#1AAD19] font-bold">請打開微信掃一掃付款</p> 
                    }
                };

                const currentInfo = paymentInfo[method];
                if (!currentInfo) return null;

                return (
                    <div className={`mt-3 p-4 rounded-xl border ${currentInfo.color} text-sm text-center slide-down`}>
                        <p className={`font-black mb-3 ${currentInfo.textCol}`}>{method} 收款資訊</p>
                        
                        {currentInfo.imgPath && (
                            <div className="bg-white p-2 rounded-xl inline-block shadow-sm mb-2 border border-neutral-100">
                                <img 
                                    src={currentInfo.imgPath} 
                                    alt={`${method} QR`} 
                                    className="w-48 h-48 object-contain mx-auto"
                                    onError={(e) => { e.target.style.display='none'; e.target.insertAdjacentHTML('afterend', '<span class="text-xs text-red-500">無法載入圖片</span>'); }} 
                                />
                            </div>
                        )}
                        {currentInfo.info}
                    </div>
                );
            };

            if (isLoading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-[#FAFAFA]">
                        <div className="w-10 h-10 border-4 border-neutral-200 border-t-black rounded-full animate-spin mb-4"></div>
                        <p className="text-[10px] font-black uppercase tracking-[0.3em]">載入庫存中...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#FAFAFA] text-[#1a1a1a] font-sans selection:bg-black selection:text-white">
                    <div className="bg-black text-white py-2 overflow-hidden whitespace-nowrap">
                        <div className="animate-marquee text-[10px] font-bold tracking-[0.2em] uppercase">
                            &nbsp; GLOBAL SHIPPING • 100% AUTHENTIC GUARANTEED • DIRECT FROM EUROPEAN BOUTIQUES • NEW ITEMS ADDED DAILY • GLOBAL SHIPPING • &nbsp;
                        </div>
                    </div>

                    <nav className="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50 px-4 py-3 shadow-sm">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <h1 className="text-2xl font-black italic tracking-tighter cursor-pointer" onClick={() => { setSelectedBrand('All'); setSearchQuery(''); }}>EXCLSV_SELECT</h1>
                            <div className="flex items-center gap-6">
                                <button onClick={() => setActiveModal('cart')} className="relative cursor-pointer hover:opacity-70 transition-opacity flex items-center gap-2">
                                    <IconShoppingBag className="w-6 h-6" />
                                    {cart.length > 0 && <span className="absolute -top-1.5 -right-1.5 bg-red-600 text-white text-[9px] font-black w-4 h-4 rounded-full flex items-center justify-center shadow-sm">{cart.reduce((a, b) => a + b.quantity, 0)}</span>}
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto py-8 px-4">
                        
                        {/* 頂部搜尋列與下拉式品牌選擇器 */}
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8 bg-white p-4 rounded-xl shadow-sm border border-neutral-100">
                            
                            <div className="relative w-full md:flex-1 md:max-w-md">
                                <input type="text" placeholder="搜尋品牌或單品..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-10 pr-4 py-3 text-sm font-bold border border-neutral-200 rounded-lg focus:outline-none focus:border-black transition-all bg-[#f9f9f9]"/>
                                <IconSearch className="absolute left-3.5 top-3.5 text-neutral-400 w-4 h-4" />
                            </div>

                            {/* 下拉選單的品牌過濾器 */}
                            <div className="relative w-full md:w-64">
                                <select
                                    value={selectedBrand}
                                    onChange={(e) => setSelectedBrand(e.target.value)}
                                    className="w-full appearance-none bg-[#f9f9f9] border border-neutral-200 text-black py-3 pl-4 pr-10 rounded-lg focus:outline-none focus:border-black font-bold text-sm shadow-sm transition-colors cursor-pointer"
                                >
                                    {brands.map(brand => (
                                        <option key={brand.name} value={brand.name}>
                                            {brand.name === 'All' ? '所有品牌 All Brands' : `${brand.name} (${brand.count})`}
                                        </option>
                                    ))}
                                </select>
                                <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-neutral-400">
                                    <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                                        <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/>
                                    </svg>
                                </div>
                            </div>

                        </div>
                        
                        {/* 產品列表 */}
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-x-4 gap-y-12 mt-4">
                            {currentItems.length > 0 ? currentItems.map((p, idx) => (
                                <div key={idx} className="group flex flex-col h-full bg-white rounded-xl p-3 border border-transparent hover:border-neutral-200 transition-all shadow-sm hover:shadow-xl">
                                    
                                    {/* 列表圖片區域 */}
                                    <div className="aspect-[3/4] overflow-hidden bg-white rounded-lg mb-4 relative cursor-pointer" onClick={() => openProductDetail(p)}>
                                        <img src={p.image || 'https://via.placeholder.com/400?text=IMAGE'} alt={p.name} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105 relative z-0" loading="lazy" />
                                        
                                        {/* 超淺色浮水印 */}
                                        <div className="absolute inset-0 flex items-center justify-center z-10 pointer-events-none overflow-hidden">
                                            <span className="text-black opacity-[0.04] font-black italic text-2xl md:text-3xl transform -rotate-45 select-none tracking-widest whitespace-nowrap">
                                                EXCLSV_SELECT
                                            </span>
                                        </div>
                                    </div>
                                    
                                    <div className="flex-grow space-y-1.5 px-1">
                                        <div className="text-[10px] font-black text-neutral-400 uppercase tracking-[0.15em]">{p.brand || 'Premium'}</div>
                                        <h3 className="font-bold text-[13px] leading-tight h-10 overflow-hidden line-clamp-2 text-neutral-800 cursor-pointer hover:underline" onClick={() => openProductDetail(p)}>{p.name}</h3>
                                        
                                        <div className="py-2">
                                            <div className="flex flex-wrap gap-1 items-center">
                                                {(p.sizes && p.sizes.length > 0) ? (
                                                    <>
                                                        {p.sizes.slice(0, 3).map((s, i) => (
                                                            <span key={i} className="text-[9px] border border-neutral-200 rounded bg-white text-neutral-600 px-1.5 py-0.5 font-bold">
                                                                {formatSize(s)}
                                                            </span>
                                                        ))}
                                                        {p.sizes.length > 3 && (
                                                            <span className="text-[9px] text-neutral-400 ml-1 font-bold">+{p.sizes.length - 3}</span>
                                                        )}
                                                    </>
                                                ) : <span className="text-[9px] text-neutral-400 italic">One Size</span>}
                                            </div>
                                            <button onClick={() => openProductDetail(p)} className="text-[10px] text-[#0084FF] font-bold mt-1.5 hover:underline flex items-center gap-1">
                                                查看詳情選擇尺碼 <IconChevronRight className="w-3 h-3" />
                                            </button>
                                        </div>

                                        <div className="pt-1 flex flex-col">
                                            <span className="text-xl font-black italic tracking-tight">HK$ {p.my_price}</span>
                                            {/* 將 MSRP 改為 原價 */}
                                            {p.original_price > p.my_price && <span className="text-[10px] text-neutral-300 line-through">原價: HK$ {p.original_price}</span>}
                                        </div>
                                    </div>
                                    
                                    <button onClick={() => openProductDetail(p)} className="w-full mt-4 py-3 bg-neutral-100 text-black rounded-lg text-[10px] font-black uppercase tracking-[0.2em] hover:bg-black hover:text-white transition-colors">
                                        選取尺碼
                                    </button>
                                </div>
                            )) : (
                                <div className="col-span-full py-20 text-center text-neutral-400 font-bold">
                                    找不到符合條件的商品
                                </div>
                            )}
                        </div>

                        {totalPages > 1 && (
                            <div className="mt-16 flex justify-center items-center gap-6">
                                <button 
                                    onClick={() => handlePageChange(currentPage - 1)} 
                                    disabled={currentPage === 1}

                                    <div className="mb-6">
                                        <span className="text-3xl font-black italic">HK$ {selectedProduct.my_price}</span>

                                                            key={i} 
                                                            onClick={() => setSelectedSize(formattedSize)}

                                                                ${isSelected 
                                                                    ? 'bg-black text-white border-black shadow-md' 
                                                                    : 'bg-white text-black border-neutral-200 hover:border-black hover:bg-neutral-50'
                                                                }`}
                                                        >
                                                            {formattedSize}
                                                        </div>
                                                    )
                                                })
                                            ) : (
                                                <div className="col-span-3 border border-black bg-black text-white rounded-lg py-3 text-center text-sm font-bold">Standard Size / F</div>

                                    <button 
                                        onClick={() => {

                                                    <tr className="hover:bg-neutral-50"><td className="py-2.5">7.5</td><td className="py-2.5">9</td><td className="py-2.5">6.5</td><td className="py-2.5">40.5</td><td className="py-2.5">25.5</td></tr>
                                                    <tr className="hover:bg-neutral-50"><td className="py-2.5">8</td><td className="py-2.5">9.5</td><td className="py-2.5">7</td><td className="py-2.5">41</td><td className="py-2.5">26</td></tr>
                                                    <tr className="hover:bg-neutral-50"><td className="py-2.5">8.5</td><td className="py-2.5">10</td><td className="py-2.5">7.5</td><td className="py-2.5">42</td><td className="py-2.5">26.5</td></tr>
                                                    <tr className="hover:bg-neutral-50"><td className="py-2.5">9</td><td className="py-2.5">10.5</td><td className="py-2.5">8</td><td className="py-2.5">42.5</td><td className="py-2.5">27</td></tr>
                                                    <tr className="hover:bg-neutral-50"><td className="py-2.5">9.5</td><td className="py-2.5">11</td><td className="py-2.5">8.5</td><td className="py-2.5">43</td><td className="py-2.5">27.5</td></tr>
                                                    <tr className="hover:bg-neutral-50"><td className="py-2.5">10</td><td className="py-2.5">11.5</td><td className="py-2.5">9</td><td className="py-2.5">44</td><td className="py-2.5">28</td></tr>
                                                    <tr className="hover:bg-neutral-50"><td className="py-2.5">10.5</td><td className="py-2.5">12</td><td className="py-2.5">9.5</td><td className="py-2.5">44.5</td><td className="py-2.5">28.5</td></tr>
                                                    <tr className="hover:bg-neutral-50"><td className="py-2.5">11</td><td className="py-2.5">12.5</td><td className="py-2.5">10</td><td className="py-2.5">45</td><td className="py-2.5">29</td></tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                        <div className="overflow-x-auto rounded-xl border border-neutral-200">
                                            <table className="w-full text-xs text-center border-collapse">
                                                <thead className="bg-neutral-50">
                                                    <tr className="border-b border-neutral-200">
                                                        <th className="py-3 font-bold text-neutral-600">Size</th>
                                                        <th className="py-3 font-bold text-neutral-600">Chest (胸圍 cm)</th>
                                                        <th className="py-3 font-bold text-neutral-600">Waist (腰圍 cm)</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-neutral-100">
                                                    <tr className="hover:bg-neutral-50"><td className="py-2.5 font-black">XS</td><td className="py-2.5">80-88</td><td className="py-2.5">65-73</td></tr>
                                                    <tr className="hover:bg-neutral-50"><td className="py-2.5 font-black">S</td><td className="py-2.5">88-96</td><td className="py-2.5">73-81</td></tr>
                                                    <tr className="hover:bg-neutral-50"><td className="py-2.5 font-black">M</td><td className="py-2.5">96-104</td><td className="py-2.5">81-89</td></tr>

                                                    <tr className="hover:bg-neutral-50"><td className="py-2.5 font-black">XL</td><td className="py-2.5">112-124</td><td className="py-2.5">97-109</td></tr>

                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-neutral-50 p-3 rounded-lg border border-neutral-100">
                                        <p className="text-[10px] text-neutral-500 font-bold leading-relaxed">
                                            * 此尺碼表僅供一般參考（Standard Reference）。不同品牌及款式的剪裁可能有所不同，部分鞋款可能偏大或偏小。如有特定商品的尺碼疑問，建議您聯絡客服為您確認。
                                        </p>
                                    </div>
                                    
                                    <button 
                                        onClick={() => setShowSizeChart(false)} 
                                        className="w-full py-3 bg-black text-white font-bold rounded-xl text-sm hover:opacity-90 transition-opacity"
                                    >
                                        關閉尺碼表
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal 2: 購物車 */}

                        <div className="fixed inset-0 z-[100] flex justify-end bg-black/40 backdrop-blur-sm transition-opacity">

                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Modal 3: 遊客結帳資料填寫 */}
                    {activeModal === 'checkoutInfo' && (
                        <div className="fixed inset-0 z-[130] flex items-center justify-center bg-black/60 p-4 backdrop-blur-md overflow-y-auto">
                            <div className="bg-white rounded-2xl w-full max-w-md p-8 shadow-2xl fade-in relative my-auto">
                                <button onClick={() => setActiveModal(cart.length > 0 ? 'cart' : null)} className="absolute top-4 right-4 text-neutral-400 hover:text-black">
                                    <IconX className="w-5 h-5" />

                                <div className="space-y-4 mb-6">
                                    <div>
                                        <label className="block text-xs font-bold text-neutral-600 mb-1">姓名 <span className="text-red-500">*</span></label>

                                            value={orderData.name}

                                            className={`w-full bg-white border ${checkoutErrors.name ? 'border-red-500' : 'border-neutral-200'} rounded-lg p-3 text-sm focus:ring-1 focus:ring-black outline-none`}

                                    <div>
                                        <label className="block text-xs font-bold text-neutral-600 mb-1">聯絡電話 <span className="text-red-500">*</span></label>

                                            type="tel" 
                                            value={orderData.phone}

                                            placeholder="手提電話號碼" 
                                            className={`w-full bg-white border ${checkoutErrors.phone ? 'border-red-500' : 'border-neutral-200'} rounded-lg p-3 text-sm focus:ring-1 focus:ring-black outline-none`}

                                        {checkoutErrors.phone && <p className="text-red-500 text-xs mt-1">{checkoutErrors.phone}</p>}
                                    </div>

                                    <div>
                                        <label className="block text-xs font-bold text-neutral-600 mb-1">收貨地址 / 順豐資料 <span className="text-red-500">*</span></label>

                                            rows="3"
                                            value={orderData.address}
                                            onChange={(e) => { setOrderData({...orderData, address: e.target.value}); setCheckoutErrors({...checkoutErrors, address: null}); }}

                                            className={`w-full bg-white border ${checkoutErrors.address ? 'border-red-500' : 'border-neutral-200'} rounded-lg p-3 text-sm focus:ring-1 focus:ring-black outline-none resize-none`} 
                                        ></textarea>
                                        {checkoutErrors.address && <p className="text-red-500 text-xs mt-1">{checkoutErrors.address}</p>}
                                    </div>
                                </div>

                                <button 
                                    onClick={validateAndProceed}
                                    className="w-full bg-black text-white font-bold py-3.5 rounded-xl text-sm hover:opacity-90 shadow-md transition-opacity"
                                >
                                    繼續付款
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Modal 4: 選擇付款方式 */}
                    {activeModal === 'checkoutPayment' && (
                        <div className="fixed inset-0 z-[140] flex items-center justify-center bg-black/60 p-4 backdrop-blur-md overflow-y-auto">

                                                    type="radio" name="payment" value={method} 
                                                    className="payment-radio absolute opacity-0"

                                                    onChange={(e) => setOrderData({...orderData, paymentMethod: e.target.value})}
                                                    disabled={isSubmitting}

                                                <div className="border-2 border-neutral-100 rounded-xl p-4 flex items-center justify-between transition-all hover:border-neutral-300">

                                                        <div className="radio-dot w-2.5 h-2.5 rounded-full bg-transparent transition-colors"></div>

                                                </div>

                                    ))}

                                        <span className="font-bold text-neutral-400">結帳總額</span>

                                    </div>

                                        onClick={generateFinalOrder}
                                        disabled={isSubmitting}
                                        className={`w-full text-white font-black italic py-4 rounded-xl shadow-lg flex justify-center items-center gap-2 transition-transform

                                            <>已付款，確認並發送訂單 <IconCheck className="w-5 h-5" /></>

                                    </button>
                                </div>
                            </div>
                        </div>

                    {activeModal === 'orderComplete' && (

                                    </a>
                                </div>

                                <button onClick={() => { setActiveModal(null); setCart([]); }} className="text-sm font-bold text-neutral-400 hover:text-black underline">
                                    返回首頁繼續選購
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
