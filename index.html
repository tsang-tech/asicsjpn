<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXCLSV_SELECT - 歐洲精品代購</title>
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 以編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 圖示 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #f9f9f9; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 30s linear infinite; }
        /* 自訂 Radio 按鈕樣式 */
        .payment-radio:checked + div { border-color: black; background-color: #fafafa; }
        .payment-radio:checked + div .radio-dot { background-color: black; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const ITEMS_PER_PAGE = 50;

        const MOCK_DATA = [
            { "brand": "JORDAN", "name": "Retro High OG 'Royal Reimagined'", "original_price": 1599, "my_price": 1159, "image": "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=400&h=533&fit=crop", "sizes": ["8", "8.5", "9", "9.5", "10", "10.5", "11"], "status": "AVAILABLE" },
            { "brand": "STUSSY", "name": "Basic Stussy Logo Tee", "original_price": 450, "my_price": 320, "image": "https://images.unsplash.com/photo-1576566588028-4147f3842f27?w=400&h=533&fit=crop", "sizes": ["S", "M", "L", "XL"], "status": "AVAILABLE" },
            { "brand": "NIKE", "name": "Air Force 1 '07 Premium", "original_price": 899, "my_price": 699, "image": "https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=400&h=533&fit=crop", "sizes": ["7", "7.5", "8", "8.5", "9"], "status": "AVAILABLE" }
        ];

        // 格式化尺碼顯示 (自動加上 US)
        const formatSize = (size) => {
            if (!size) return '';
            // 如果只有數字或數字加小數點 (例如 8, 9.5)，自動補上 US
            if (/^\d+(\.\d+)?$/.test(size)) {
                return `US ${size}`;
            }
            return size;
        };

        const App = () => {
            const [products, setProducts] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [isMockData, setIsMockData] = useState(false);

            const [searchQuery, setSearchQuery] = useState('');
            const [selectedBrand, setSelectedBrand] = useState('All');
            const [sortOption, setSortOption] = useState('default');
            const [currentPage, setCurrentPage] = useState(1);

            const [cart, setCart] = useState([]);
            // Modal 狀態: null, 'cart', 'productDetail', 'checkoutAuth', 'checkoutPayment', 'orderComplete'
            const [activeModal, setActiveModal] = useState(null); 
            const [selectedProduct, setSelectedProduct] = useState(null);

            // 結帳流程資料收集
            const [orderData, setOrderData] = useState({
                customerType: 'guest', // 'member' or 'guest'
                contactInfo: '',
                paymentMethod: 'PayMe'
            });
            const [orderLinks, setOrderLinks] = useState({ whatsappUrl: '', messengerUrl: '', orderDetails: '' });

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch('./products.json');
                        if (!response.ok) throw new Error('File not found');
                        const data = await response.json();
                        const validData = data
                            .filter(p => p.my_price > 0 || p.original_price > 0)
                            .map(p => ({ ...p, id: Math.random().toString(36).substr(2, 9) }));
                        setProducts(validData.length > 0 ? validData : MOCK_DATA.map(p => ({...p, id: Math.random().toString(36).substr(2,9)})));
                    } catch (err) {
                        setIsMockData(true);
                        setProducts(MOCK_DATA.map(p => ({...p, id: Math.random().toString(36).substr(2,9)})));
                    } finally {
                        setIsLoading(false);
                    }
                };
                fetchData();
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            const brands = useMemo(() => {
                const counts = {};
                products.forEach(p => {
                    const b = p.brand || 'Other';
                    counts[b] = (counts[b] || 0) + 1;
                });
                const sortedBrands = Object.keys(counts).sort((a, b) => counts[b] - counts[a]).slice(0, 30);
                return [{ name: 'All', count: products.length }, ...sortedBrands.map(b => ({ name: b, count: counts[b] }))];
            }, [products]);

            const filteredProducts = useMemo(() => {
                let result = [...products];
                if (selectedBrand !== 'All') result = result.filter(p => (p.brand || 'Other') === selectedBrand);
                if (searchQuery.trim()) {
                    const q = searchQuery.toLowerCase();
                    result = result.filter(p => (p.name && p.name.toLowerCase().includes(q)) || (p.brand && p.brand.toLowerCase().includes(q)));
                }
                if (sortOption === 'price-asc') result.sort((a, b) => a.my_price - b.my_price);
                else if (sortOption === 'price-desc') result.sort((a, b) => b.my_price - a.my_price);
                return result;
            }, [products, selectedBrand, searchQuery, sortOption]);

            const totalPages = Math.ceil(filteredProducts.length / ITEMS_PER_PAGE);
            const currentItems = filteredProducts.slice((currentPage - 1) * ITEMS_PER_PAGE, currentPage * ITEMS_PER_PAGE);

            const addToCart = (product) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) return prev.map(item => item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item);
                    return [...prev, { ...product, quantity: 1 }];
                });
                setActiveModal('cart');
            };

            const removeFromCart = (id) => setCart(prev => prev.filter(item => item.id !== id));
            const cartTotal = cart.reduce((sum, item) => sum + (item.my_price * item.quantity), 0);

            // 開啟商品詳情
            const openProductDetail = (product) => {
                setSelectedProduct(product);
                setActiveModal('productDetail');
            };

            // 最終生成訂單連結
            const generateFinalOrder = () => {
                const phoneNumber = "85265215017";
                const pageId = "104976785186000"; 
                
                let orderText = "🛒 *新訂單通知*\n";
                orderText += `👤 客戶身份: ${orderData.customerType === 'member' ? '會員' : '遊客'}\n`;
                orderText += `📞 聯絡方式: ${orderData.contactInfo}\n`;
                orderText += `💳 支付方式: ${orderData.paymentMethod}\n`;
                orderText += "------------------\n";
                
                cart.forEach((item, index) => {
                    orderText += `${index + 1}. ${item.brand || '無品牌'} - ${item.name}\n   數量: ${item.quantity}\n   價格: HK$ ${item.my_price * item.quantity}\n\n`;
                });
                orderText += `------------------\n💰 *總金額: HK$ ${cartTotal}*`;

                const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(orderText)}`;
                const messengerUrl = `https://m.me/${pageId}`;
                
                setOrderLinks({ whatsappUrl, messengerUrl, orderDetails: orderText });
                setActiveModal('orderComplete');
            };

            if (isLoading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-[#f9f9f9]">
                        <div className="w-10 h-10 border-4 border-neutral-200 border-t-black rounded-full animate-spin mb-4"></div>
                        <p className="text-[10px] font-black uppercase tracking-[0.3em]">載入庫存中...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#f9f9f9] text-[#1a1a1a] font-sans selection:bg-black selection:text-white">
                    {/* 跑馬燈與導覽列... (保持原樣) */}
                    <div className="bg-black text-white py-2 overflow-hidden whitespace-nowrap">
                        <div className="animate-marquee text-[10px] font-bold tracking-[0.2em] uppercase">
                            &nbsp; GLOBAL SHIPPING • 100% AUTHENTIC GUARANTEED • DIRECT FROM EUROPEAN BOUTIQUES • NEW ITEMS ADDED DAILY • GLOBAL SHIPPING • &nbsp;
                        </div>
                    </div>

                    <nav className="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50 px-4 py-3 shadow-sm">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <h1 className="text-2xl font-black italic tracking-tighter cursor-pointer" onClick={() => { setSelectedBrand('All'); setSearchQuery(''); }}>EXCLSV_SELECT</h1>
                            <div className="flex items-center gap-6">
                                <button onClick={() => setActiveModal('checkoutAuth')} className="hidden md:flex items-center gap-2 text-sm font-bold hover:text-neutral-500 transition-colors">
                                    <i data-lucide="user" className="w-5 h-5"></i> 登入/註冊
                                </button>
                                <button onClick={() => setActiveModal('cart')} className="relative cursor-pointer hover:opacity-70 transition-opacity">
                                    <i data-lucide="shopping-bag" className="w-6 h-6"></i>
                                    {cart.length > 0 && <span className="absolute -top-1.5 -right-1.5 bg-red-600 text-white text-[9px] font-black w-4 h-4 rounded-full flex items-center justify-center shadow-sm">{cart.reduce((a, b) => a + b.quantity, 0)}</span>}
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto py-8 px-4">
                        {/* 搜尋列與品牌... (保持原樣) */}
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8 bg-white p-4 rounded-xl shadow-sm border border-neutral-100">
                            <div className="relative w-full md:w-96">
                                <input type="text" placeholder="搜尋品牌或單品..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-10 pr-4 py-2.5 text-sm font-bold border border-neutral-200 rounded-lg focus:outline-none focus:border-black transition-all bg-[#f9f9f9]"/>
                                <i data-lucide="search" className="absolute left-3.5 top-3 text-neutral-400 w-4 h-4"></i>
                            </div>
                            <div className="flex gap-2 w-full md:w-auto overflow-x-auto hide-scrollbar">
                                <select value={sortOption} onChange={(e) => setSortOption(e.target.value)} className="w-full md:w-auto text-sm font-bold border border-neutral-200 rounded-lg px-4 py-2.5 outline-none bg-[#f9f9f9]">
                                    <option value="default">排序: 推薦</option>
                                    <option value="price-asc">價格: 由低到高</option>
                                    <option value="price-desc">價格: 由高到低</option>
                                </select>
                            </div>
                        </div>

                        <div className="mb-12 flex gap-2 overflow-x-auto pb-4 hide-scrollbar">
                            {brands.map(brand => (
                                <button key={brand.name} onClick={() => setSelectedBrand(brand.name)} className={`px-5 py-2.5 text-[10px] font-black uppercase tracking-widest rounded-full border-2 whitespace-nowrap transition-all ${selectedBrand === brand.name ? 'bg-black text-white border-black' : 'bg-white text-neutral-400 border-neutral-100'}`}>
                                    {brand.name} {brand.name !== 'All' && <span className="opacity-50 ml-1">({brand.count})</span>}
                                </button>
                            ))}
                        </div>
                        
                        {/* 商品網格 */}
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-x-4 gap-y-12">
                            {currentItems.map((p, idx) => (
                                <div key={idx} className="group flex flex-col h-full bg-white rounded-xl p-3 border border-transparent hover:border-neutral-200 transition-all shadow-sm hover:shadow-xl">
                                    <div className="aspect-[3/4] overflow-hidden bg-[#f4f4f4] rounded-lg mb-4 relative cursor-pointer" onClick={() => openProductDetail(p)}>
                                        <img src={p.image || 'https://via.placeholder.com/400?text=IMAGE'} alt={p.name} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" loading="lazy" />
                                    </div>
                                    
                                    <div className="flex-grow space-y-1.5 px-1">
                                        <div className="text-[10px] font-black text-neutral-400 uppercase tracking-[0.15em]">{p.brand || 'Premium'}</div>
                                        <h3 className="font-bold text-[13px] leading-tight h-10 overflow-hidden line-clamp-2 text-neutral-800 cursor-pointer hover:underline" onClick={() => openProductDetail(p)}>{p.name}</h3>
                                        
                                        {/* 顯示部分尺碼與查看詳情按鈕 */}
                                        <div className="py-2">
                                            <div className="flex flex-wrap gap-1 items-center">
                                                {(p.sizes && p.sizes.length > 0) ? (
                                                    <>
                                                        {p.sizes.slice(0, 3).map((s, i) => (
                                                            <span key={i} className="text-[9px] border border-neutral-200 rounded bg-white text-neutral-600 px-1.5 py-0.5 font-bold">
                                                                {formatSize(s)}
                                                            </span>
                                                        ))}
                                                        {p.sizes.length > 3 && (
                                                            <span className="text-[9px] text-neutral-400 ml-1 font-bold">+{p.sizes.length - 3}</span>
                                                        )}
                                                    </>
                                                ) : <span className="text-[9px] text-neutral-400 italic">One Size</span>}
                                            </div>
                                            <button onClick={() => openProductDetail(p)} className="text-[10px] text-[#0084FF] font-bold mt-1.5 hover:underline flex items-center gap-1">
                                                查看詳情 <i data-lucide="chevron-right" className="w-3 h-3"></i>
                                            </button>
                                        </div>

                                        <div className="pt-1 flex flex-col">
                                            <span className="text-xl font-black italic tracking-tight">HK$ {p.my_price}</span>
                                            {p.original_price > p.my_price && <span className="text-[10px] text-neutral-300 line-through">MSRP: HK$ {p.original_price}</span>}
                                        </div>
                                    </div>
                                    
                                    <button onClick={() => addToCart(p)} className="w-full mt-4 py-3 bg-neutral-100 text-black rounded-lg text-[10px] font-black uppercase tracking-[0.2em] hover:bg-black hover:text-white transition-colors">
                                        加入購物車
                                    </button>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="bg-black text-white mt-20 py-16 px-4 text-center space-y-4">
                        <h3 className="text-2xl font-black italic tracking-tighter">EXCLSV_SELECT</h3>
                        <p className="text-[9px] text-neutral-500 uppercase tracking-[0.4em]">© 2024 ALL RIGHTS RESERVED</p>
                    </footer>

                    {/* Modal 1: 商品詳情 (顯示完整尺碼) */}
                    {activeModal === 'productDetail' && selectedProduct && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center bg-black/60 p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl max-w-3xl w-full flex flex-col md:flex-row overflow-hidden shadow-2xl fade-in max-h-[90vh]">
                                <div className="w-full md:w-1/2 bg-[#f4f4f4] relative">
                                    <button onClick={() => setActiveModal(null)} className="absolute top-4 left-4 p-2 bg-white/80 rounded-full md:hidden z-10">
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                    <img src={selectedProduct.image} className="w-full h-64 md:h-full object-cover" />
                                </div>
                                <div className="w-full md:w-1/2 p-6 md:p-10 flex flex-col overflow-y-auto">
                                    <div className="flex justify-between items-start mb-2">
                                        <p className="text-xs font-black text-neutral-400 uppercase tracking-widest">{selectedProduct.brand}</p>
                                        <button onClick={() => setActiveModal(null)} className="hidden md:block text-neutral-400 hover:text-black">
                                            <i data-lucide="x" className="w-6 h-6"></i>
                                        </button>
                                    </div>
                                    <h2 className="text-2xl font-black leading-tight mb-4">{selectedProduct.name}</h2>
                                    <div className="mb-6">
                                        <span className="text-3xl font-black italic">HK$ {selectedProduct.my_price}</span>
                                        {selectedProduct.original_price > selectedProduct.my_price && (
                                            <span className="text-sm text-neutral-400 line-through ml-3">HK$ {selectedProduct.original_price}</span>
                                        )}
                                    </div>

                                    {/* 完整尺碼顯示區 */}
                                    <div className="mb-8">
                                        <div className="flex items-center justify-between mb-3">
                                            <span className="text-sm font-bold uppercase tracking-widest">Select Size</span>
                                            <span className="text-[10px] text-neutral-400 underline cursor-pointer">尺碼指南</span>
                                        </div>
                                        <div className="grid grid-cols-3 gap-2">
                                            {selectedProduct.sizes && selectedProduct.sizes.length > 0 ? (
                                                selectedProduct.sizes.map((s, i) => (
                                                    <div key={i} className="border border-neutral-200 rounded-lg py-3 text-center text-sm font-bold hover:border-black cursor-pointer transition-colors bg-white hover:bg-neutral-50">
                                                        {formatSize(s)}
                                                    </div>
                                                ))
                                            ) : (
                                                <div className="col-span-3 border border-neutral-200 rounded-lg py-3 text-center text-sm font-bold">Standard Size / F</div>
                                            )}
                                        </div>
                                    </div>

                                    <button 
                                        onClick={() => { addToCart(selectedProduct); setActiveModal('cart'); }} 
                                        className="mt-auto w-full py-4 bg-black text-white font-black italic tracking-widest uppercase rounded-xl hover:opacity-90 transition-opacity"
                                    >
                                        加入購物車
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal 2: 購物車 */}
                    {activeModal === 'cart' && (
                        <div className="fixed inset-0 z-[100] flex justify-end bg-black/40 backdrop-blur-sm transition-opacity">
                            <div className="w-full max-w-md bg-white h-full shadow-2xl p-6 flex flex-col fade-in relative">
                                <div className="flex justify-between items-center mb-6 border-b pb-4">
                                    <h2 className="text-2xl font-black italic">MY BAG</h2>
                                    <button onClick={() => setActiveModal(null)} className="p-2"><i data-lucide="x"></i></button>
                                </div>
                                <div className="flex-grow overflow-y-auto space-y-6 pr-2">
                                    {cart.map(item => (
                                        <div key={item.id} className="flex gap-4 pb-4 border-b">
                                            <img src={item.image} className="w-20 h-24 object-cover rounded" />
                                            <div className="flex-grow">
                                                <p className="text-[10px] text-neutral-400 font-bold">{item.brand}</p>
                                                <h4 className="text-sm font-bold leading-tight">{item.name}</h4>
                                                <div className="flex justify-between items-end mt-4">
                                                    <p className="text-xs bg-neutral-100 px-2 py-1 rounded">x{item.quantity}</p>
                                                    <p className="font-black">HK$ {item.my_price * item.quantity}</p>
                                                </div>
                                            </div>
                                            <button onClick={() => removeFromCart(item.id)} className="text-neutral-300 hover:text-red-500"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                        </div>
                                    ))}
                                    {cart.length === 0 && <p className="text-center text-neutral-400 mt-20">購物車是空的</p>}
                                </div>
                                {cart.length > 0 && (
                                    <div className="pt-4 border-t mt-4">
                                        <div className="flex justify-between mb-4">
                                            <span className="font-bold text-neutral-400">Total</span>
                                            <span className="text-2xl font-black italic">HK$ {cartTotal}</span>
                                        </div>
                                        <button onClick={() => setActiveModal('checkoutAuth')} className="w-full bg-black text-white py-4 rounded-xl font-black italic">去結帳</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Modal 3: 登入或遊客結帳 (Auth) */}
                    {activeModal === 'checkoutAuth' && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center bg-black/60 p-4 backdrop-blur-md">
                            <div className="bg-white rounded-2xl w-full max-w-md p-8 shadow-2xl fade-in relative">
                                <button onClick={() => setActiveModal(cart.length > 0 ? 'cart' : null)} className="absolute top-4 right-4 text-neutral-400 hover:text-black">
                                    <i data-lucide="x" className="w-5 h-5"></i>
                                </button>
                                <h2 className="text-2xl font-black italic mb-6 text-center">結帳方式</h2>
                                
                                {/* 登入區塊 */}
                                <div className="border border-neutral-200 rounded-xl p-5 mb-6">
                                    <h3 className="font-bold text-sm mb-4 flex items-center gap-2"><i data-lucide="user" className="w-4 h-4"></i> 會員登入</h3>
                                    <input type="text" placeholder="Email / 手機號碼" className="w-full bg-neutral-100 border-none rounded-lg p-3 text-sm mb-3 focus:ring-1 focus:ring-black outline-none" />
                                    <input type="password" placeholder="密碼" className="w-full bg-neutral-100 border-none rounded-lg p-3 text-sm mb-4 focus:ring-1 focus:ring-black outline-none" />
                                    <button 
                                        onClick={() => { setOrderData({...orderData, customerType: 'member', contactInfo: '已登入會員'}); setActiveModal('checkoutPayment'); }}
                                        className="w-full bg-black text-white font-bold py-3 rounded-lg text-sm"
                                    >登入並繼續</button>
                                    <p className="text-center text-xs text-neutral-400 mt-3 underline cursor-pointer">建立新帳戶</p>
                                </div>

                                <div className="relative flex py-2 items-center mb-6">
                                    <div className="flex-grow border-t border-neutral-200"></div>
                                    <span className="flex-shrink-0 mx-4 text-neutral-400 text-xs font-bold uppercase">OR</span>
                                    <div className="flex-grow border-t border-neutral-200"></div>
                                </div>

                                {/* 遊客區塊 */}
                                <div className="border border-neutral-200 rounded-xl p-5">
                                    <h3 className="font-bold text-sm mb-4 flex items-center gap-2"><i data-lucide="shopping-bag" className="w-4 h-4"></i> 遊客結帳</h3>
                                    <input 
                                        type="text" 
                                        placeholder="輸入 Email 或 電話以便聯絡" 
                                        onChange={(e) => setOrderData({...orderData, contactInfo: e.target.value})}
                                        className="w-full bg-neutral-100 border-none rounded-lg p-3 text-sm mb-4 focus:ring-1 focus:ring-black outline-none" 
                                    />
                                    <button 
                                        onClick={() => { 
                                            setOrderData({...orderData, customerType: 'guest', contactInfo: orderData.contactInfo || '未提供聯絡方式(遊客)'}); 
                                            setActiveModal('checkoutPayment'); 
                                        }}
                                        className="w-full bg-white border-2 border-black text-black font-bold py-3 rounded-lg text-sm hover:bg-black hover:text-white transition-colors"
                                    >以遊客身份繼續</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal 4: 選擇付款方式 (Payment) */}
                    {activeModal === 'checkoutPayment' && (
                        <div className="fixed inset-0 z-[130] flex items-center justify-center bg-black/60 p-4 backdrop-blur-md">
                            <div className="bg-white rounded-2xl w-full max-w-md p-8 shadow-2xl fade-in relative">
                                <button onClick={() => setActiveModal('checkoutAuth')} className="absolute top-4 left-4 text-neutral-400 hover:text-black">
                                    <i data-lucide="arrow-left" className="w-5 h-5"></i>
                                </button>
                                <button onClick={() => setActiveModal(null)} className="absolute top-4 right-4 text-neutral-400 hover:text-black">
                                    <i data-lucide="x" className="w-5 h-5"></i>
                                </button>
                                
                                <h2 className="text-2xl font-black italic mb-2 text-center mt-2">PAYMENT</h2>
                                <p className="text-center text-xs text-neutral-400 font-bold mb-6">請選擇線上支付方式</p>
                                
                                <div className="space-y-3 mb-8">
                                    {['轉數快 (FPS)', 'PayMe', '支付寶 (AlipayHK)', 'WeChat Pay'].map((method) => (
                                        <label key={method} className="relative block cursor-pointer">
                                            <input 
                                                type="radio" name="payment" value={method} 
                                                className="payment-radio absolute opacity-0"
                                                checked={orderData.paymentMethod === method}
                                                onChange={(e) => setOrderData({...orderData, paymentMethod: e.target.value})}
                                            />
                                            <div className="border-2 border-neutral-100 rounded-xl p-4 flex items-center justify-between transition-all hover:border-neutral-300">
                                                <span className="font-bold text-sm">{method}</span>
                                                <div className="w-5 h-5 rounded-full border-2 border-neutral-300 flex items-center justify-center">
                                                    <div className="radio-dot w-2.5 h-2.5 rounded-full bg-transparent transition-colors"></div>
                                                </div>
                                            </div>
                                        </label>
                                    ))}
                                </div>

                                <div className="border-t border-neutral-100 pt-6">
                                    <div className="flex justify-between mb-6">
                                        <span className="font-bold text-neutral-400">結帳總額</span>
                                        <span className="text-xl font-black italic">HK$ {cartTotal}</span>
                                    </div>
                                    <button 
                                        onClick={generateFinalOrder}
                                        className="w-full bg-black text-white font-black italic py-4 rounded-xl shadow-lg flex justify-center items-center gap-2 hover:scale-[1.02] active:scale-95 transition-transform"
                                    >
                                        確認並發送訂單 <i data-lucide="check" className="w-5 h-5"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal 5: 訂單完成 (社交導向 - 保持原樣但加入支付與帳戶資訊) */}
                    {activeModal === 'orderComplete' && (
                        <div className="fixed inset-0 z-[140] flex items-center justify-center bg-black/60 p-4 backdrop-blur-md">
                            <div className="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl fade-in relative">
                                <div className="w-16 h-16 bg-neutral-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <i data-lucide="send" className="w-8 h-8 text-black"></i>
                                </div>
                                <h2 className="text-2xl font-black italic tracking-tighter mb-2 uppercase">最後一步</h2>
                                <p className="text-neutral-500 text-xs font-bold leading-relaxed mb-6 px-2">
                                    您已選擇 <strong>{orderData.paymentMethod}</strong>。<br/>請點擊下方按鈕發送清單，客服將為您提供收款帳號並確認訂單。
                                </p>
                                
                                <div className="space-y-3 mb-6">
                                    <a href={orderLinks.whatsappUrl} target="_blank" className="flex items-center justify-center w-full py-3.5 bg-[#25D366] text-white font-black rounded-xl hover:opacity-90 transition-opacity text-sm shadow-sm">
                                        發送至 WhatsApp
                                    </a>
                                    <a href={orderLinks.messengerUrl} target="_blank" className="flex items-center justify-center w-full py-3.5 bg-[#0084FF] text-white font-black rounded-xl hover:opacity-90 transition-opacity text-sm shadow-sm">
                                        前往 Messenger
                                    </a>
                                </div>
                                <button onClick={() => { setActiveModal(null); setCart([]); }} className="text-xs font-bold text-neutral-400 underline hover:text-black">
                                    完成並返回首頁
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
