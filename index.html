<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXCLSV_SELECT - 歐洲精品代購</title>
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 以編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 圖示 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #f9f9f9; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 30s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const ITEMS_PER_PAGE = 50;

        // 預覽環境的備用測試資料
        const MOCK_DATA = [
            { "brand": "JORDAN", "name": "Retro High OG 'Royal Reimagined'", "original_price": 1599, "my_price": 1159, "image": "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=400&h=533&fit=crop", "sizes": ["US 8", "US 9", "US 10"], "status": "AVAILABLE" },
            { "brand": "STUSSY", "name": "Basic Stussy Logo Tee", "original_price": 450, "my_price": 320, "image": "https://images.unsplash.com/photo-1576566588028-4147f3842f27?w=400&h=533&fit=crop", "sizes": ["S", "M", "L", "XL"], "status": "AVAILABLE" },
            { "brand": "NIKE", "name": "Air Force 1 '07 Premium", "original_price": 899, "my_price": 699, "image": "https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=400&h=533&fit=crop", "sizes": ["US 7", "US 8", "US 8.5"], "status": "AVAILABLE" }
        ];

        const App = () => {
            // 基本狀態
            const [products, setProducts] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [isMockData, setIsMockData] = useState(false);

            // 篩選與分頁狀態
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedBrand, setSelectedBrand] = useState('All');
            const [sortOption, setSortOption] = useState('default');
            const [currentPage, setCurrentPage] = useState(1);

            // 購物車與結帳狀態
            const [cart, setCart] = useState([]);
            const [activeModal, setActiveModal] = useState(null); // null, 'cart', 'orderComplete'
            const [orderLinks, setOrderLinks] = useState({ whatsappUrl: '', messengerUrl: '', orderDetails: '' });

            // 1. 初始化載入資料
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch('./products.json');
                        if (!response.ok) throw new Error('File not found');
                        const data = await response.json();
                        
                        if (!Array.isArray(data) || data.length === 0) {
                            throw new Error('JSON 為空陣列');
                        }

                        // 加入唯一 ID，以利購物車操作
                        const validData = data
                            .filter(p => p.my_price > 0 || p.original_price > 0)
                            .map(p => ({ ...p, id: Math.random().toString(36).substr(2, 9) }));
                            
                        setProducts(validData.length > 0 ? validData : MOCK_DATA.map(p => ({...p, id: Math.random().toString(36).substr(2,9)})));
                    } catch (err) {
                        console.warn('載入真實資料失敗，啟用測試資料。', err);
                        setIsMockData(true);
                        setProducts(MOCK_DATA.map(p => ({...p, id: Math.random().toString(36).substr(2,9)})));
                    } finally {
                        setIsLoading(false);
                    }
                };
                fetchData();
            }, []);

            // 2. 重新渲染 Lucide 圖示
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            // 3. 計算品牌列表與數量
            const brands = useMemo(() => {
                const counts = {};
                products.forEach(p => {
                    const b = p.brand || 'Other';
                    counts[b] = (counts[b] || 0) + 1;
                });
                const sortedBrands = Object.keys(counts)
                    .sort((a, b) => counts[b] - counts[a])
                    .slice(0, 30);
                return [{ name: 'All', count: products.length }, ...sortedBrands.map(b => ({ name: b, count: counts[b] }))];
            }, [products]);

            // 4. 處理過濾與排序
            const filteredProducts = useMemo(() => {
                let result = [...products];

                if (selectedBrand !== 'All') {
                    result = result.filter(p => (p.brand || 'Other') === selectedBrand);
                }

                if (searchQuery.trim()) {
                    const q = searchQuery.toLowerCase();
                    result = result.filter(p => 
                        (p.name && p.name.toLowerCase().includes(q)) || 
                        (p.brand && p.brand.toLowerCase().includes(q))
                    );
                }

                if (sortOption === 'price-asc') {
                    result.sort((a, b) => a.my_price - b.my_price);
                } else if (sortOption === 'price-desc') {
                    result.sort((a, b) => b.my_price - a.my_price);
                }

                return result;
            }, [products, selectedBrand, searchQuery, sortOption]);

            // 5. 分頁計算
            const totalPages = Math.ceil(filteredProducts.length / ITEMS_PER_PAGE);
            const currentItems = filteredProducts.slice(
                (currentPage - 1) * ITEMS_PER_PAGE, 
                currentPage * ITEMS_PER_PAGE
            );

            useEffect(() => {
                setCurrentPage(1);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, [searchQuery, selectedBrand, sortOption]);

            const handlePageChange = (newPage) => {
                if (newPage >= 1 && newPage <= totalPages) {
                    setCurrentPage(newPage);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

            // 6. 購物車邏輯
            const addToCart = (product) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) {
                        return prev.map(item => item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item);
                    }
                    return [...prev, { ...product, quantity: 1 }];
                });
                setActiveModal('cart');
            };

            const removeFromCart = (id) => {
                setCart(prev => prev.filter(item => item.id !== id));
            };

            const cartTotal = cart.reduce((sum, item) => sum + (item.my_price * item.quantity), 0);

            // 7. 結帳與社群導向
            const handleCheckout = () => {
                const phoneNumber = "85265215017";
                const pageId = "104976785186000"; // EXCLSV SELECT FB ID
                
                let orderText = "🛒 *新訂單通知*\n------------------\n";
                cart.forEach((item, index) => {
                    orderText += `${index + 1}. ${item.brand || '無品牌'} - ${item.name}\n   數量: ${item.quantity}\n   價格: HK$ ${item.my_price * item.quantity}\n\n`;
                });
                orderText += `------------------\n💰 *總金額: HK$ ${cartTotal}*`;

                const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(orderText)}`;
                const messengerUrl = `https://m.me/${pageId}`;
                
                setOrderLinks({ whatsappUrl, messengerUrl, orderDetails: orderText });
                setActiveModal('orderComplete');
            };

            const handleMessengerClick = () => {
                const textArea = document.createElement("textarea");
                textArea.value = orderLinks.orderDetails;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                } catch (err) {
                    console.error('無法複製', err);
                }
                document.body.removeChild(textArea);
                window.open(orderLinks.messengerUrl, '_blank');
            };

            // 渲染載入中
            if (isLoading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-[#f9f9f9] text-neutral-400">
                        <div className="w-10 h-10 border-4 border-neutral-200 border-t-black rounded-full animate-spin mb-4"></div>
                        <p className="text-[10px] font-black uppercase tracking-[0.3em]">載入庫存中...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#f9f9f9] text-[#1a1a1a] font-sans selection:bg-black selection:text-white">
                    {/* 測試資料提示 */}
                    {isMockData && (
                        <div className="bg-red-600 text-white text-center py-2 text-[11px] font-bold tracking-widest uppercase shadow-md flex items-center justify-center gap-2">
                            <i data-lucide="alert-circle" className="w-4 h-4"></i>
                            AI 預覽模式已啟用測試資料。
                        </div>
                    )}

                    {/* 跑馬燈 */}
                    <div className="bg-black text-white py-2 overflow-hidden whitespace-nowrap">
                        <div className="animate-marquee text-[10px] font-bold tracking-[0.2em] uppercase">
                            &nbsp; GLOBAL SHIPPING • 100% AUTHENTIC GUARANTEED • DIRECT FROM EUROPEAN BOUTIQUES • NEW ITEMS ADDED DAILY • GLOBAL SHIPPING • 100% AUTHENTIC GUARANTEED • DIRECT FROM EUROPEAN BOUTIQUES • &nbsp;
                        </div>
                    </div>

                    {/* 導覽列 */}
                    <nav className="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50 px-4 py-3 shadow-sm">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <h1 
                                className="text-2xl font-black italic tracking-tighter cursor-pointer hover:opacity-70 transition-opacity"
                                onClick={() => { setSelectedBrand('All'); setSearchQuery(''); }}
                            >
                                EXCLSV_SELECT
                            </h1>
                            <div className="flex items-center gap-4">
                                <span className="hidden md:block text-[10px] font-black text-red-600 border-2 border-red-600 px-2 py-0.5 italic">
                                    OUTLET LIVE
                                </span>
                                <button onClick={() => setActiveModal('cart')} className="relative cursor-pointer hover:opacity-70 transition-opacity">
                                    <i data-lucide="shopping-bag" className="w-6 h-6"></i>
                                    {cart.length > 0 && (
                                        <span className="absolute -top-1.5 -right-1.5 bg-red-600 text-white text-[9px] font-black w-4 h-4 rounded-full flex items-center justify-center shadow-sm">
                                            {cart.reduce((a, b) => a + b.quantity, 0)}
                                        </span>
                                    )}
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto py-8 px-4">
                        {/* 標題與搜尋列 */}
                        <div className="mb-8">
                            <h2 className="text-4xl font-black uppercase tracking-tight italic leading-none mb-2">Mega Sale</h2>
                            <p className="text-neutral-400 text-[10px] font-bold uppercase tracking-widest italic">
                                {filteredProducts.length} ITEMS MATCH YOUR SEARCH
                            </p>
                        </div>

                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8 bg-white p-4 rounded-xl shadow-sm border border-neutral-100">
                            <div className="relative w-full md:w-96">
                                <input 
                                    type="text" 
                                    placeholder="搜尋品牌或單品 (例如 Nike, Jacket)..." 
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="w-full pl-10 pr-4 py-2.5 text-sm font-bold border border-neutral-200 rounded-lg focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition-all bg-[#f9f9f9]"
                                />
                                <i data-lucide="search" className="absolute left-3.5 top-3 text-neutral-400 w-4 h-4"></i>
                            </div>
                            
                            <div className="relative w-full md:w-auto">
                                <select 
                                    value={sortOption}
                                    onChange={(e) => setSortOption(e.target.value)}
                                    className="w-full md:w-auto text-sm font-bold border border-neutral-200 rounded-lg pl-4 pr-10 py-2.5 focus:outline-none focus:border-black focus:ring-1 focus:ring-black appearance-none bg-[#f9f9f9] cursor-pointer text-neutral-600"
                                >
                                    <option value="default">排序: 推薦</option>
                                    <option value="price-asc">價格: 由低到高</option>
                                    <option value="price-desc">價格: 由高到低</option>
                                </select>
                                <i data-lucide="chevron-down" className="absolute right-3 top-3.5 text-neutral-400 pointer-events-none w-4 h-4"></i>
                            </div>
                        </div>

                        {/* 熱門品牌 */}
                        <div className="mb-12">
                            <div className="flex items-center gap-2 mb-4 text-[10px] font-black uppercase tracking-[0.2em] text-neutral-400">
                                <div className="w-8 h-[1px] bg-neutral-300"></div>
                                熱門品牌
                            </div>
                            <div className="flex gap-2 overflow-x-auto pb-4 hide-scrollbar">
                                {brands.map((brand) => (
                                    <button 
                                        key={brand.name}
                                        onClick={() => setSelectedBrand(brand.name)}
                                        className={`px-5 py-2.5 text-[10px] font-black uppercase tracking-widest rounded-full border-2 whitespace-nowrap transition-all
                                            ${selectedBrand === brand.name 
                                                ? 'bg-black text-white border-black shadow-lg scale-105' 
                                                : 'bg-white text-neutral-400 border-neutral-100 hover:border-black hover:text-black'}`}
                                    >
                                        {brand.name} {brand.name !== 'All' && <span className="opacity-50 ml-1">({brand.count})</span>}
                                    </button>
                                ))}
                            </div>
                        </div>
                        
                        {/* 商品網格 */}
                        {currentItems.length === 0 ? (
                            <div className="col-span-full py-20 text-center text-neutral-400 font-bold uppercase tracking-widest flex flex-col items-center">
                                <i data-lucide="alert-circle" className="w-12 h-12 mb-4 opacity-20"></i>
                                找不到符合條件的商品
                            </div>
                        ) : (
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-x-4 gap-y-12">
                                {currentItems.map((p, idx) => (
                                    <div key={idx} className="group flex flex-col h-full bg-white rounded-xl p-3 border border-transparent hover:border-neutral-200 transition-all hover:shadow-xl">
                                        <div className="aspect-[3/4] overflow-hidden bg-[#f4f4f4] rounded-lg mb-4 relative">
                                            <img 
                                                src={p.image || 'https://via.placeholder.com/400x533?text=IMAGE'} 
                                                alt={p.name}
                                                className="w-full h-full object-cover transition-transform duration-1000 ease-out group-hover:scale-105" 
                                                loading="lazy"
                                                onError={(e) => { e.target.src = 'https://via.placeholder.com/400x533?text=NOT+FOUND' }}
                                            />
                                            {p.original_price > p.my_price && (
                                                <div className="bg-gradient-to-tr from-red-500 to-red-700 absolute top-2 left-2 text-white text-[9px] font-black px-2 py-1 rounded-md italic uppercase tracking-tighter shadow-md">
                                                    -{Math.round((1 - p.my_price/p.original_price)*100)}%
                                                </div>
                                            )}
                                        </div>
                                        
                                        <div className="flex-grow space-y-1.5 px-1">
                                            <div className="text-[10px] font-black text-neutral-400 uppercase tracking-[0.15em]">{p.brand || 'Premium'}</div>
                                            <h3 className="font-bold text-[13px] leading-tight h-10 overflow-hidden line-clamp-2 text-neutral-800">
                                                {p.name}
                                            </h3>
                                            
                                            <div className="py-2">
                                                <div className="flex flex-wrap gap-1">
                                                    {(p.sizes && p.sizes.length > 0 && p.sizes[0] !== 'F') ? (
                                                        <>
                                                            {p.sizes.slice(0, 4).map((s, i) => (
                                                                <span key={i} className="text-[9px] border border-neutral-200 rounded-md px-1.5 py-0.5 font-bold bg-white text-neutral-600">
                                                                    {s}
                                                                </span>
                                                            ))}
                                                            {p.sizes.length > 4 && (
                                                                <span className="text-[9px] text-neutral-400 self-center ml-1 font-bold">
                                                                    +{p.sizes.length - 4}
                                                                </span>
                                                            )}
                                                        </>
                                                    ) : (
                                                        <span className="text-[9px] text-neutral-400 italic uppercase tracking-widest font-bold">Standard Size</span>
                                                    )}
                                                </div>
                                            </div>

                                            <div className="pt-2 flex flex-col">
                                                <span className="text-xl font-black italic tracking-tight">HK$ {p.my_price}</span>
                                                {p.original_price > p.my_price ? (
                                                    <span className="text-[10px] text-neutral-300 line-through tracking-tighter">MSRP: HK$ {p.original_price}</span>
                                                ) : (
                                                    <span className="text-[10px] text-transparent">MSRP</span>
                                                )}
                                            </div>
                                        </div>
                                        
                                        <button onClick={() => addToCart(p)} className="w-full mt-4 py-3 bg-neutral-100 text-black rounded-lg text-[10px] font-black uppercase tracking-[0.2em] hover:bg-black hover:text-white active:scale-95 transition-all flex items-center justify-center gap-2">
                                            加入購物車
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* 分頁器 */}
                        {totalPages > 0 && (
                            <div className="mt-20 flex flex-col items-center gap-6 border-t border-neutral-100 pt-12">
                                <div className="text-[10px] font-black text-neutral-300 uppercase tracking-[0.4em]">
                                    第 {currentPage} 頁 / 共 {totalPages} 頁
                                </div>
                                <div className="flex items-center gap-3">
                                    <button 
                                        onClick={() => handlePageChange(currentPage - 1)}
                                        disabled={currentPage === 1}
                                        className="w-10 h-10 flex items-center justify-center border border-neutral-200 rounded-full hover:bg-black hover:text-white transition-all disabled:opacity-20 disabled:hover:bg-transparent disabled:hover:text-current"
                                    >
                                        <i data-lucide="chevron-left" className="w-4 h-4"></i>
                                    </button>
                                    
                                    <div className="flex gap-2 font-mono text-sm flex-wrap justify-center">
                                        {[...Array(totalPages)].map((_, i) => {
                                            const p = i + 1;
                                            if (p === 1 || p === totalPages || (p >= currentPage - 2 && p <= currentPage + 2)) {
                                                return (
                                                    <button 
                                                        key={p}
                                                        onClick={() => handlePageChange(p)}
                                                        className={`w-8 h-8 rounded-full transition-colors ${currentPage === p ? 'bg-black text-white font-bold shadow-md' : 'text-neutral-400 hover:bg-neutral-100 hover:text-black'}`}
                                                    >
                                                        {p}
                                                    </button>
                                                );
                                            } else if (p === currentPage - 3 || p === currentPage + 3) {
                                                return <span key={p} className="text-neutral-300 px-1 self-center">...</span>;
                                            }
                                            return null;
                                        })}
                                    </div>

                                    <button 
                                        onClick={() => handlePageChange(currentPage + 1)}
                                        disabled={currentPage === totalPages}
                                        className="w-10 h-10 flex items-center justify-center border border-neutral-200 rounded-full hover:bg-black hover:text-white transition-all disabled:opacity-20 disabled:hover:bg-transparent disabled:hover:text-current"
                                    >
                                        <i data-lucide="chevron-right" className="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-black text-white mt-32 py-16 px-4">
                        <div className="max-w-7xl mx-auto text-center space-y-4">
                            <h3 className="text-2xl font-black italic tracking-tighter">EXCLSV_SELECT</h3>
                            <p className="text-[9px] text-neutral-500 uppercase tracking-[0.4em] leading-relaxed">
                                Directly Sourced from EU Boutiques<br/>
                                No Returns on Clearance Items<br/>
                                © 2024 ALL RIGHTS RESERVED
                            </p>
                        </div>
                    </footer>

                    {/* 購物車 Modal */}
                    {activeModal === 'cart' && (
                        <div className="fixed inset-0 z-[100] flex justify-end bg-black/40 backdrop-blur-sm transition-opacity">
                            <div className="w-full max-w-md bg-white h-full shadow-2xl p-6 md:p-8 flex flex-col fade-in relative">
                                <div className="flex justify-between items-center mb-8 border-b border-neutral-100 pb-4">
                                    <h2 className="text-2xl font-black italic tracking-tighter flex items-center gap-2">
                                        <i data-lucide="shopping-bag" className="w-6 h-6"></i> MY BAG
                                    </h2>
                                    <button onClick={() => setActiveModal(null)} className="p-2 hover:bg-neutral-100 rounded-full transition-colors">
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                </div>
                                
                                <div className="flex-grow overflow-y-auto space-y-6 pr-2 hide-scrollbar">
                                    {cart.length > 0 ? cart.map(item => (
                                        <div key={item.id} className="flex gap-4 pb-6 relative group">
                                            <div className="w-20 h-24 bg-neutral-50 rounded-lg overflow-hidden flex-shrink-0">
                                                <img src={item.image} className="w-full h-full object-cover" />
                                            </div>
                                            <div className="flex-grow">
                                                <p className="text-[10px] text-neutral-400 uppercase font-black tracking-widest mb-1">{item.brand}</p>
                                                <h4 className="text-sm font-bold pr-6 leading-tight mb-2">{item.name}</h4>
                                                <div className="flex justify-between items-end mt-auto">
                                                    <p className="text-sm font-black font-mono bg-neutral-100 px-2 py-0.5 rounded italic">x{item.quantity}</p>
                                                    <p className="text-sm font-black">HK$ {item.my_price * item.quantity}</p>
                                                </div>
                                            </div>
                                            <button onClick={() => removeFromCart(item.id)} className="absolute top-0 right-0 p-1 text-neutral-300 hover:text-red-500 transition-colors">
                                                <i data-lucide="trash-2" className="w-4 h-4"></i>
                                            </button>
                                        </div>
                                    )) : (
                                        <div className="text-center py-20 flex flex-col items-center">
                                            <i data-lucide="shopping-cart" className="w-16 h-16 text-neutral-200 mb-4"></i>
                                            <p className="text-neutral-400 font-bold text-sm tracking-widest uppercase">您的購物車是空的</p>
                                        </div>
                                    )}
                                </div>

                                {cart.length > 0 && (
                                    <div className="pt-6 border-t border-neutral-100 mt-4 bg-white">
                                        <div className="flex justify-between mb-6">
                                            <span className="font-bold text-neutral-400 uppercase tracking-widest text-xs">Total Amount</span>
                                            <span className="text-2xl font-black italic tracking-tighter">HK$ {cartTotal}</span>
                                        </div>
                                        <button 
                                            onClick={handleCheckout}
                                            className="w-full bg-black text-white py-4 rounded-xl font-black italic tracking-widest text-sm hover:scale-[1.02] active:scale-95 transition-all shadow-xl flex justify-center items-center gap-2"
                                        >
                                            CHECKOUT NOW <i data-lucide="arrow-right" className="w-4 h-4"></i>
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* 結帳成功/社群導航 Modal */}
                    {activeModal === 'orderComplete' && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/60 p-4 backdrop-blur-md">
                            <div className="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl fade-in relative">
                                <div className="w-16 h-16 bg-neutral-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <i data-lucide="package-check" className="w-8 h-8 text-black"></i>
                                </div>
                                <h2 className="text-2xl font-black italic tracking-tighter mb-3 uppercase">最後一步：發送訂單</h2>
                                <p className="text-neutral-500 text-xs font-bold leading-relaxed mb-8 px-2">
                                    請選擇您偏好的聯絡方式發送清單給我們，客服將與您確認付款及收件細節。
                                </p>
                                
                                <div className="space-y-3 mb-8">
                                    <a href={orderLinks.whatsappUrl} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center w-full py-3.5 bg-[#25D366] text-white font-black rounded-xl hover:opacity-90 transition-opacity text-sm shadow-sm">
                                        <svg className="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.099.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.031 18.906c-1.61 0-3.167-.42-4.526-1.217l-5.068 1.332 1.355-4.941c-.886-1.399-1.353-3.033-1.353-4.717 0-4.832 3.931-8.763 8.763-8.763 4.831 0 8.762 3.931 8.762 8.763 0 4.832-3.932 8.763-8.763 8.763z"/></svg>
                                        確認發送 WhatsApp
                                    </a>
                                    
                                    <button onClick={handleMessengerClick} className="flex items-center justify-center w-full py-3.5 bg-[#0084FF] text-white font-black rounded-xl hover:opacity-90 transition-opacity text-sm shadow-sm">
                                        <svg className="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.145 2 11.259c0 2.923 1.516 5.518 3.864 7.218v3.523l3.527-1.936c.833.23 1.706.353 2.609.353 5.523 0 10-4.145 10-9.259S17.523 2 12 2zm1.096 12.336-2.846-3.04-5.54 3.04 6.075-6.452 2.906 3.04 5.48-3.04-6.075 6.452z"/></svg>
                                        複製訂單並前往 Messenger
                                    </button>
                                    
                                    <a href={orderLinks.messengerUrl} target="_blank" rel="noopener noreferrer" className="block text-[11px] font-bold text-[#0084FF] mt-2 hover:underline">
                                        👉 如果沒有自動跳轉，請點此手動打開
                                    </a>
                                </div>

                                <button onClick={() => setActiveModal(null)} className="text-xs font-bold text-neutral-400 hover:text-black transition-colors uppercase tracking-widest border-b border-transparent hover:border-black pb-0.5">
                                    返回繼續選購
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
